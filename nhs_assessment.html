<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHS Assessment Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #003865;
    --teal: #006272;
    --sky: #41B6E6;
    --green: #009639;
    --red: #DA291C;
    --amber: #ED8B00;
    --white: #FAFAF8;
    --off: #F0EDE8;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --border: #D4CFC8;
    --card: #FFFFFF;
    --correct-bg: #EBF7EE;
    --wrong-bg: #FDECEA;
    --correct-border: #009639;
    --wrong-border: #DA291C;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--white);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SCREEN SYSTEM ─── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ─── HOME SCREEN ─── */
  #home {
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }

  .home-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 80% 20%, rgba(65,182,230,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 10% 80%, rgba(0,98,114,0.4) 0%, transparent 50%);
    pointer-events: none;
  }

  .home-grid {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(65,182,230,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(65,182,230,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .home-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }

  .home-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(65,182,230,0.15);
    border: 1px solid rgba(65,182,230,0.3);
    color: var(--sky);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 16px; border-radius: 100px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .home-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(42px, 8vw, 88px);
    color: var(--white);
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 8px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .home-title em {
    font-style: italic;
    color: var(--sky);
  }

  .home-subtitle {
    font-size: 15px; color: rgba(250,250,248,0.55);
    font-weight: 400; letter-spacing: 0.5px;
    margin-bottom: 56px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .topic-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; max-width: 560px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .topic-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 28px 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    position: relative; overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(65,182,230,0.1), transparent);
    opacity: 0; transition: opacity 0.25s;
  }

  .topic-card:hover { 
    border-color: rgba(65,182,230,0.5);
    transform: translateY(-3px);
    background: rgba(255,255,255,0.08);
  }
  .topic-card:hover::before { opacity: 1; }

  .topic-card.selected {
    border-color: var(--sky);
    background: rgba(65,182,230,0.15);
  }

  .topic-icon {
    font-size: 28px; margin-bottom: 12px; display: block;
  }

  .topic-label {
    font-size: 18px; font-weight: 700;
    color: var(--white); margin-bottom: 4px;
  }

  .topic-desc {
    font-size: 12px; color: rgba(250,250,248,0.5);
    font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
  }

  .home-next {
    margin-top: 32px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* ─── SET SELECT SCREEN ─── */
  #setselect {
    background: var(--off);
  }

  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
  }

  .back-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--ink); cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .topbar-title {
    font-size: 15px; font-weight: 700; color: var(--ink);
  }

  .topbar-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    margin-left: auto;
  }

  .setselect-inner {
    padding: 32px 24px; max-width: 720px; margin: 0 auto; width: 100%;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 12px;
  }

  .set-group { margin-bottom: 32px; }

  .set-group-title {
    font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 12px;
    font-family: 'DM Mono', monospace;
  }

  .set-list { display: flex; flex-direction: column; gap: 8px; }

  .set-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.2s;
  }
  .set-item:hover { border-color: var(--navy); transform: translateX(4px); }

  .set-item-left { display: flex; flex-direction: column; gap: 4px; }
  .set-item-name { font-size: 15px; font-weight: 700; }
  .set-item-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
  }

  .set-item-arrow {
    width: 32px; height: 32px;
    background: var(--off); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.2s;
  }
  .set-item:hover .set-item-arrow { background: var(--navy); color: var(--white); }

  /* ─── MODE SELECT ─── */
  #modeselect { background: var(--off); }

  .mode-inner {
    padding: 32px 24px; max-width: 600px; margin: 0 auto; width: 100%;
  }

  .mode-hero {
    background: var(--navy);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    color: var(--white);
    position: relative; overflow: hidden;
  }
  .mode-hero::after {
    content: '';
    position: absolute; right: -20px; top: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(65,182,230,0.15);
  }

  .mode-hero-topic {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--sky);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .mode-hero-set {
    font-family: 'DM Serif Display', serif;
    font-size: 26px; margin-bottom: 4px;
  }
  .mode-hero-count {
    font-size: 13px; color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace;
  }

  .mode-cards { display: flex; flex-direction: column; gap: 12px; }

  .mode-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    display: flex; align-items: center; gap: 20px;
    cursor: pointer; transition: all 0.25s;
  }
  .mode-card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

  .mode-card-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .mode-warmup .mode-card-icon { background: #FFF3E0; }
  .mode-practice .mode-card-icon { background: #E8F5E9; }
  .mode-mock .mode-card-icon { background: #E3F2FD; }

  .mode-card-text { flex: 1; }
  .mode-card-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
  .mode-card-desc { font-size: 13px; color: var(--muted); }

  .mode-card-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px;
    background: var(--off); color: var(--muted);
  }
  .mode-mock .mode-card-badge { background: #E3F2FD; color: #1565C0; }

  /* ─── QUIZ SCREEN ─── */
  #quiz { background: var(--off); }

  .quiz-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
  }

  .quiz-info { flex: 1; }
  .quiz-set-name {
    font-size: 13px; font-weight: 700; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .quiz-mode-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
  }

  .quiz-progress-wrap { flex: 1; max-width: 180px; }
  .quiz-progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-align: right; margin-bottom: 4px;
  }
  .quiz-progress-bar {
    height: 4px; background: var(--border); border-radius: 100px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; background: var(--navy);
    border-radius: 100px; transition: width 0.4s ease;
  }

  .quiz-timer {
    font-family: 'DM Mono', monospace;
    font-size: 15px; font-weight: 500;
    color: var(--navy); padding: 6px 12px;
    background: var(--off); border-radius: 8px;
    min-width: 72px; text-align: center;
  }
  .quiz-timer.urgent { color: var(--red); background: #FDECEA; animation: pulse 1s infinite; }

  .quiz-body {
    flex: 1; padding: 24px;
    max-width: 720px; margin: 0 auto; width: 100%;
  }

  .q-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .q-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }

  .q-text {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 600; line-height: 1.55;
    color: var(--ink);
  }

  /* MCQ OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  .option-btn {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--ink);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
    position: relative;
  }

  .option-letter {
    width: 26px; height: 26px; flex-shrink: 0;
    background: var(--off);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500; color: var(--muted);
    transition: all 0.2s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--navy);
    background: rgba(0,56,101,0.04);
  }
  .option-btn:hover:not(:disabled) .option-letter {
    background: var(--navy); color: var(--white);
  }

  .option-btn.selected { border-color: var(--navy); background: rgba(0,56,101,0.06); }
  .option-btn.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .option-btn.correct .option-letter { background: var(--correct-border); color: var(--white); }
  .option-btn.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
  .option-btn.wrong .option-letter { background: var(--wrong-border); color: var(--white); }
  .option-btn:disabled { cursor: default; }

  /* INPUT MODE */
  .input-wrap { margin-top: 20px; }
  .input-field {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 18px; font-weight: 500;
    color: var(--ink); background: var(--white);
    outline: none; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--navy); }
  .input-field.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .input-field.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }

  /* FEEDBACK */
  .feedback-box {
    padding: 14px 18px;
    border-radius: 12px;
    margin-top: 12px;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .feedback-box.correct { background: var(--correct-bg); border: 1px solid var(--correct-border); }
  .feedback-box.wrong { background: var(--wrong-bg); border: 1px solid var(--wrong-border); }
  .feedback-box.show { display: block; }

  .feedback-status {
    font-size: 13px; font-weight: 700;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .feedback-box.correct .feedback-status { color: var(--correct-border); }
  .feedback-box.wrong .feedback-status { color: var(--wrong-border); }

  .feedback-explanation {
    font-size: 13px; color: var(--ink); line-height: 1.5;
  }

  /* ACTIONS */
  .quiz-actions {
    display: flex; gap: 10px; margin-top: 16px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px; border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--navy); color: var(--white);
  }
  .btn-primary:hover { background: #00264d; transform: translateY(-1px); }

  .btn-sky {
    background: var(--sky); color: var(--white);
  }
  .btn-sky:hover { background: #2fa0d4; transform: translateY(-1px); }

  .btn-ghost {
    background: var(--white); color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--ink); }

  .btn-lg { padding: 16px 36px; font-size: 15px; border-radius: 14px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ─── RESULTS SCREEN ─── */
  #results { background: var(--off); }

  .results-inner {
    padding: 40px 24px; max-width: 640px; margin: 0 auto; width: 100%;
  }

  .results-score-card {
    background: var(--navy);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
    color: var(--white);
  }

  .results-score-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(65,182,230,0.12);
  }

  .results-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--sky);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 16px;
  }

  .results-big-score {
    font-family: 'DM Serif Display', serif;
    font-size: 80px; line-height: 1;
    color: var(--white); margin-bottom: 4px;
  }

  .results-fraction {
    font-family: 'DM Mono', monospace;
    font-size: 14px; color: rgba(255,255,255,0.5);
    margin-bottom: 20px;
  }

  .results-percent-bar {
    height: 8px; background: rgba(255,255,255,0.15);
    border-radius: 100px; overflow: hidden; margin-bottom: 20px;
  }
  .results-percent-fill {
    height: 100%; border-radius: 100px;
    transition: width 1s ease;
  }
  .results-percent-fill.great { background: var(--green); }
  .results-percent-fill.ok { background: var(--amber); }
  .results-percent-fill.low { background: var(--red); }

  .results-msg {
    font-size: 14px; color: rgba(255,255,255,0.65);
  }

  .results-breakdown {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden; margin-bottom: 20px;
  }

  .breakdown-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; font-family: 'DM Mono', monospace;
  }

  .breakdown-item {
    padding: 14px 20px;
    display: flex; align-items: flex-start; gap: 12px;
    border-bottom: 1px solid var(--off);
  }
  .breakdown-item:last-child { border-bottom: none; }

  .breakdown-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; margin-top: 1px;
  }
  .breakdown-icon.c { background: var(--correct-bg); color: var(--correct-border); }
  .breakdown-icon.w { background: var(--wrong-bg); color: var(--wrong-border); }

  .breakdown-q { font-size: 13px; line-height: 1.4; flex: 1; }
  .breakdown-q strong { display: block; font-weight: 600; margin-bottom: 2px; }
  .breakdown-q span { color: var(--muted); font-size: 12px; }
  .breakdown-correct-ans {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--correct-border);
    margin-top: 3px;
  }

  .results-actions {
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ─── UTILITIES ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .hidden { display: none !important; }

  /* MOBILE */
  @media (max-width: 500px) {
    .topic-cards { grid-template-columns: 1fr; }
    .options-grid { grid-template-columns: 1fr; }
    .quiz-progress-wrap { display: none; }
    .results-big-score { font-size: 60px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════ HOME ══ -->
<div id="home" class="screen active">
  <div class="home-bg"></div>
  <div class="home-grid"></div>
  <div class="home-inner">
    <div class="home-badge">🏥 NHS Assessment Trainer</div>
    <h1 class="home-title">Prepare to<br><em>Pass.</em></h1>
    <p class="home-subtitle">Numeracy &amp; Literacy practice — warm-ups, tests, mock exams</p>

    <div class="topic-cards">
      <div class="topic-card" data-topic="numeracy" onclick="selectTopic('numeracy')">
        <span class="topic-icon">🔢</span>
        <div class="topic-label">Numeracy</div>
        <div class="topic-desc">Arithmetic · Meds · Time</div>
      </div>
      <div class="topic-card" data-topic="literacy" onclick="selectTopic('literacy')">
        <span class="topic-icon">📖</span>
        <div class="topic-label">Literacy</div>
        <div class="topic-desc">Grammar · Spelling · Comprehension</div>
      </div>
    </div>

    <div class="home-next" id="homeNext" style="display:none;">
      <button class="btn btn-sky btn-lg" onclick="goToSetSelect()">Choose a Test Set →</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════ SET SELECT ══ -->
<div id="setselect" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('home')">← Back</button>
    <span class="topbar-title" id="ssTitle">Select a Test</span>
    <span class="topbar-sub" id="ssTopicTag"></span>
  </div>
  <div class="setselect-inner" id="setListContainer"></div>
</div>

<!-- ══════════════════════════════════════ MODE SELECT ══ -->
<div id="modeselect" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="showScreen('setselect')">← Back</button>
    <span class="topbar-title">Choose Mode</span>
  </div>
  <div class="mode-inner">
    <div class="mode-hero">
      <div class="mode-hero-topic" id="mhTopic"></div>
      <div class="mode-hero-set" id="mhSet"></div>
      <div class="mode-hero-count" id="mhCount"></div>
    </div>

    <div class="mode-cards" id="modeCards"></div>
  </div>
</div>

<!-- ══════════════════════════════════════ QUIZ ══ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="confirmQuit()">✕ Quit</button>

      { id:"nm1-6", set:"mock1", setName:"Numeracy Mock 1", type:"mcq", question:"Patient prescribed 75mg once daily. Mg per week?", options:["375mg","750mg","525mg","252mg"], answer:"525mg", explanation:"75×7=525mg." },
      { id:"nm1-7", set:"mock1", setName:"Numeracy Mock 1", type:"mcq", question:"8mg medication 3× daily. Mg in 5 days?", options:["24mg","240mg","140mg","120mg"], answer:"120mg", explanation:"8×3=24/day. 24×5=120mg." },

      { id:"nm1-9", set:"mock1", setName:"Numeracy Mock 1", type:"mcq", question:"Med A (15mg × 1/day) + Med B (50mg × 2/day) + Med C (75mg × 5/day). Total mg in 10 days?", options:["5,050mg","4,750mg","4,900mg","5,600mg"], answer:"4,900mg", explanation:"(15+100+375)=490/day. 490×10=4,900mg." },

  literacy: {

      { id:"lw1", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Marcus is not as bright as Andrew. Who is brighter?", options:["Andrew","Marcus","Neither"], answer:"Andrew", explanation:"If Marcus is not as bright as Andrew, then Andrew is brighter." },
      { id:"lw2", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Sharon is taller than Sheila. Who is the tallest?", options:["Sharon","Sheila","Neither"], answer:"Sharon", explanation:"Sharon is taller, so Sharon is the tallest." },
      { id:"lw3", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Pauline is stronger than Beverley. Who is the weaker of the two?", options:["Pauline","Beverley","Neither"], answer:"Beverley", explanation:"Pauline is stronger, so Beverley is weaker." },
      { id:"lw4", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Gary is lighter than Frederick. Who is the heavier?", options:["Gary","Frederick","Neither"], answer:"Frederick", explanation:"Gary is lighter, so Frederick is heavier." },
      { id:"lw5", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"The black car is faster than the white car. Which car is the quickest?", options:["Black car","White car","Neither"], answer:"Black car", explanation:"Black car is faster = quickest." },
      { id:"lw6", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Rachel runs faster than her sister Georgia. Who runs the slowest?", options:["Georgia","Rachel","Neither"], answer:"Georgia", explanation:"Rachel is faster, so Georgia is slowest." },
      { id:"lw7", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"David has more money than Arnold. Who is the poorer?", options:["Arnold","David","Neither"], answer:"Arnold", explanation:"David has more money, so Arnold is poorer." },
      { id:"lw8", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Jill is weaker than Bill. Who is the strongest?", options:["Jill","Bill","Neither"], answer:"Bill", explanation:"Jill is weaker, so Bill is the strongest." },
      { id:"lw9", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Sadie's shoe size is 7 and Mary's is 9. Who needs the larger size?", options:["Mary","Sadie","Neither"], answer:"Mary", explanation:"Size 9 > size 7, so Mary needs larger shoes." },
      { id:"lw10", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Pete is faster than Rick. Who is the slowest?", options:["Pete","Rick","Neither"], answer:"Rick", explanation:"Pete is faster, so Rick is slowest." },
      { id:"lw11", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Alphabetical order of: Delightful, Delicious, Delayed, Delicate. Which is third?", options:["Delightful","Delicious","Delayed","Delicate"], answer:"Delicious", explanation:"Alphabetically: Delayed, Delicate, Delicious, Delightful. Third = Delicious." },
      { id:"lw12", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Mark > Jane > Nigel (speed). Nigel < Bill. Bill > Mark. Who is the slowest?", options:["Nigel","Jane","Bill","Mark"], answer:"Nigel", explanation:"Order: Bill>Mark>Jane>Nigel. Nigel is slowest." },
      { id:"lw13", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Chair is to sit as ladder is to?", options:["Climb","Step","Bridge","Metal"], answer:"Climb", explanation:"A chair is used to sit; a ladder is used to climb." },
      { id:"lw14", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Alphabetical order: Believe, Beast, Belief, Bereaved. Which is second?", options:["Believe","Beast","Belief","Bereaved"], answer:"Belief", explanation:"Beast, Belief, Believe, Bereaved. Second = Belief." },
      { id:"lw15", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Hayley sleeps 10 hours; Julie sleeps 650 minutes. Who sleeps longest?", options:["Hayley","Julie","Neither"], answer:"Julie", explanation:"10hr=600min. 650 > 600, so Julie sleeps longer." },
      { id:"lw16", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"George is sadder than Mark. Who is the happier of the two?", options:["Mark","George","Neither"], answer:"Mark", explanation:"George is sadder, so Mark is happier." },
      { id:"lw17", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Hammer is to nail as Bat is to?", options:["Fly","Ball","Cricket","Hit"], answer:"Ball", explanation:"A hammer strikes a nail; a bat strikes a ball." },
      { id:"lw18", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Which word has the most vowels? Reasonable, Combination, Vegetables, Audaciously", options:["Reasonable","Combination","Vegetables","Audaciously"], answer:"Audaciously", explanation:"Audaciously has 6 vowels (a, u, a, i, o, u)." },
      { id:"lw19", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"Which word has the fewest vowels? Barber, Radio, Disastrous, March", options:["Barber","Radio","Disastrous","March"], answer:"March", explanation:"March has only 1 vowel (a)." },
      { id:"lw20", set:"lwarmup1", setName:"Literacy Warm-Up 1", type:"mcq", question:"'The mechanic worked on the car for 3 hours. At the end, he was _____'", options:["home","rich","exhausted","thinking"], answer:"exhausted", explanation:"After 3 hours of manual work, exhausted makes the most sense." },
      { id:"lw2-1", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Car, Aeroplane, Train, Bicycle, House", options:["Car","Aeroplane","Train","Bicycle","House"], answer:"House", explanation:"House is not a mode of transport — the others all are." },
      { id:"lw2-2", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Right, White, Dart, Bright, Sight", options:["Right","White","Dart","Bright","Sight"], answer:"Dart", explanation:"Right, White, Bright, Sight all rhyme with '-ight'. Dart does not." },
      { id:"lw2-3", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which word will 'IN' NOT work with to make a longer word? direct, famous, desirable, cart", options:["direct","famous","desirable","cart"], answer:"cart", explanation:"Indirect, infamous, indesirable all work. 'Incart' is not a word." },
      { id:"lw2-4", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Pink, Salt, Ball, Red, Grey", options:["Pink","Salt","Ball","Red","Grey"], answer:"Red", explanation:"Pink, Salt, Ball, Grey can all precede or follow 'Red'. Wait — Salt is odd: the others are all colours except Salt (a substance)." },
      { id:"lw2-5", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Run, Jog, Walk, Sit, Sprint", options:["Run","Jog","Walk","Sit","Sprint"], answer:"Sit", explanation:"Run, Jog, Walk, Sprint are all forms of locomotion. Sit is not." },
      { id:"lw2-6", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Eagle, Plane, Squirrel, Cloud, Sparrow", options:["Eagle","Plane","Squirrel","Cloud","Sparrow"], answer:"Squirrel", explanation:"Eagle, Plane, Cloud, Sparrow are all things found in the sky. Squirrel is not." },
      { id:"lw2-7", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Gold, Ivory, Platinum, Bronze, Silver", options:["Gold","Ivory","Platinum","Bronze","Silver"], answer:"Ivory", explanation:"Gold, Platinum, Bronze, Silver are all metals. Ivory is not." },
      { id:"lw2-8", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Pond, River, Stream, Brook, Ocean", options:["Pond","River","Stream","Brook","Ocean"], answer:"Pond", explanation:"River, Stream, Brook, Ocean are all flowing or vast bodies of water; a Pond is still and small. Pond is the odd one out." },
      { id:"lw2-9", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Best words for the sentence: 'The man ____ to walk along the beach. He threw the stick and the dog _____ it'", options:["Hated/Chose","Decided/Wanted","Liked/Chased","Hurried/Chased"], answer:"Liked/Chased", explanation:"'Liked to walk' and 'chased it' both make natural, logical sense." },
      { id:"lw2-10", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Best word: 'David decided it was time to turn _____ and go back home.'", options:["up","in","home","around"], answer:"around", explanation:"'Turn around and go back' is the natural phrase." },
      { id:"lw2-11", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Best word: 'We would be _____ to hear any comments you may have.'", options:["pleased","worried","available","suited"], answer:"pleased", explanation:"'Pleased to hear comments' is the natural, positive phrasing." },
      { id:"lw2-12", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Cat, Dog, Hamster, Owl", options:["Cat","Dog","Hamster","Owl"], answer:"Owl", explanation:"Cat, Dog, Hamster are common domestic pets. Owl is not typically kept as a pet." },
      { id:"lw2-13", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Wood, Chair, Table, Stool", options:["Wood","Chair","Table","Stool"], answer:"Wood", explanation:"Chair, Table, Stool are all furniture items. Wood is a material." },
      { id:"lw2-14", set:"lwarmup2", setName:"Literacy Warm-Up 2", type:"mcq", question:"Which is the odd one out? Football, Wrestling, Golf, Rugby", options:["Football","Wrestling","Golf","Rugby"], answer:"Wrestling", explanation:"Football, Golf, Rugby are ball sports. Wrestling does not use a ball." }

    practice: [
      { id:"lp1-1", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Text: 'He caught the train at 3pm, which is later than expected. He was supposed to arrive at half past 2.' What time was Terry supposed to arrive?", options:["13:00","13:45","15:00","14:30"], answer:"14:30", explanation:"Half past 2 = 14:30." },
      { id:"lp1-2", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Passage contains 'demonstartes'. Which word is spelt incorrectly?", options:["Naturally","actually","demonstrates","initiatives"], answer:"demonstrates", explanation:"It should be 'demonstrates', not 'demonstartes'." },
      { id:"lp1-3", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Passage contains: 'comunication', 'farely', 'stuctured', 'comprehensibel'. How many spelling errors?", options:["3","5","4","6"], answer:"4", explanation:"Four words misspelt: communication, fairly, structured, comprehensible." },
      { id:"lp1-4", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Ahmed wakes, makes tea after wash, gets dressed, does washing after breakfast. Correct order?", options:["Wake up; wash; make tea; do washing; breakfast; get dressed","Wake up; wash; make tea; get dressed; breakfast; do washing","Make tea; Wake up; wash; breakfast; get dressed; do washing","Wake up; make tea; wash; breakfast; do washing; get dressed"], answer:"Wake up; wash; make tea; get dressed; breakfast; do washing", explanation:"Wake → wash → tea (after wash) → get dressed → breakfast → washing (after breakfast)." },
      { id:"lp1-5", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Tomorrow morning, I _____ play football. We're going to win, and then _____ some ice cream.", options:["will, bought","won't, buy","did, purchased","will, buy"], answer:"will, buy", explanation:"Future tense: 'will play' and 'will buy'." },
      { id:"lp1-6", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Which word describes something that cannot be identified as different or distinct?", options:["Indistinguishable","Indescribable","Counterfeit","Differential"], answer:"Indistinguishable", explanation:"Indistinguishable = cannot be told apart or identified as distinct." },
      { id:"lp1-7", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Which word describes something untidy or poorly-kept?", options:["Crumpled","Marinated","Dishevelled","Bemused"], answer:"Dishevelled", explanation:"Dishevelled = untidy or in disorder." },
      { id:"lp1-8", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Which word describes something convincing or believable?", options:["Presumptuous","Incredible","Assumptive","Credible"], answer:"Credible", explanation:"Credible = capable of being believed; convincing." },
      { id:"lp1-9", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Which word fits both? (Safe, Steady) (Hay, Jodhpurs)", options:["Chickens","Stable","Farm","Sky"], answer:"Stable", explanation:"Stable = safe/steady AND where hay and riding gear are kept." },
      { id:"lp1-10", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Which word fits both? (Power, Watt) (Ram, Assault)", options:["Punching","Kicking","Battery","Boxing"], answer:"Battery", explanation:"Battery = electrical power unit AND violent assault/ramming." },
      { id:"lp1-11", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Speaker 1 believes public transport would suffer without grammar. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"True", explanation:"Speaker 1 states: 'Public transport would be utterly disrupted.'" },
      { id:"lp1-12", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Both speakers agree grammar has a sustained impact on public life. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"True", explanation:"Both speakers reference grammar's impact on public life." },
      { id:"lp1-13", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Speaker 2 regards book relatability as more important than grammar. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"Impossible to say", explanation:"Speaker 2 discusses understanding a book but doesn't specifically reference 'relatability'." },
      { id:"lp1-14", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Identify the correct sentence:", options:["Harriet and James buried they're treasure in the back garden. No one would ever know.","Harriet and James buried their treasure in the back garden. No one would ever know.","Harriet and James berried their treasure in the back garden. No one would ever know.","Harriet and James buried their treasure in the back garden. No one would ever no."], answer:"Harriet and James buried their treasure in the back garden. No one would ever know.", explanation:"'Their' = possession. 'Know' = knowledge. Both correctly used in option B." },
      { id:"lp1-15", set:"lpractice1", setName:"Literacy Practice 1", type:"mcq", question:"Identify the correct sentence:", options:["Were going to spend all of our time at the beach while the whether is nice.","We're going to spend all of are time at the beach while the weather is nice.","We're going to spend all of our time at the beach while the weather is nice.","We're going to spend all of are time at the beach while the weather is nice."], answer:"We're going to spend all of our time at the beach while the weather is nice.", explanation:"'We're' (we are), 'our' (possession), 'weather' (climate) — all correct." },
      { id:"lp2-1", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Text: 'Lucy's flight is now scheduled to leave at 4 in the morning.' What time is the plane scheduled to leave?", options:["16:00","04:00","14:00","08:00"], answer:"04:00", explanation:"4 in the morning = 04:00." },
      { id:"lp2-2", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Surgery at 07:30. Anaesthetic 20 minutes before surgery. What time is anaesthetic administered?", options:["07:00","19:10","17:00","07:10"], answer:"07:10", explanation:"07:30 − 20 min = 07:10." },
      { id:"lp2-3", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Ward manager: signs in, then grabs coffee, checks notes from previous shift, reads emails. Before briefing, walks the ward. Last task: management meeting. Correct order?", options:["Sign in; coffee; check notes; emails; check ward; brief team; meeting","Sign in; check notes; coffee; brief team; emails; meeting; check ward","Coffee; sign in; emails; check notes; brief team; check ward; meeting","Sign in; coffee; brief team; check notes; check ward; emails; meeting"], answer:"Sign in; coffee; check notes; emails; check ward; brief team; meeting", explanation:"Sign in → coffee → check notes → emails → check ward → brief team → meeting." },
      { id:"lp2-4", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Passage: 'Their not ready…the proffessor declared…None of them have done enough practise!' How many errors?", options:["3","1","2","0"], answer:"2", explanation:"'Their' should be 'They're', and 'proffessor' should be 'professor'." },
      { id:"lp2-5", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Identify the correct sentence:", options:["The dentist asked me to lay down. Then the drilling began.","The dentist asked me to lie down. Then the drilling begun.","The dentist asked me to laid down. Then the drilling began.","The dentist asked me to lie down. Then the drilling began."], answer:"The dentist asked me to lie down. Then the drilling began.", explanation:"'Lie down' (recline) and 'began' (past tense of begin) are both correct." },
      { id:"lp2-6", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Identify the correct sentence:", options:["I was running out of patience with Luke. 'The way your going, there's no turning back.'","I was running out of patients with Luke. 'The way you're going, theres no turning back.'","I was running out of patience with Luke. 'The way you're going, there's no turning back.'","I was running out of patients with Luke. 'The way you're going, there's no turning back.'"], answer:"I was running out of patience with Luke. 'The way you're going, there's no turning back.'", explanation:"'Patience' (tolerance), 'you're' (you are), 'there's' (there is) all correct." },
      { id:"lp2-7", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"The writer believes students get higher marks by replicating the lecturer's writing style. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"True", explanation:"The passage states lecturers give higher grades to those who replicate their work." },
      { id:"lp2-8", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"According to the passage, there is no point grading fiction. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"True", explanation:"The passage says grading fiction 'seems utterly benign'." },
      { id:"lp2-9", set:"lpractice2", setName:"Literacy Practice 2", type:"mcq", question:"Meeting lecturers at the pub will NOT improve your grade. True, False or Impossible to say?", options:["True","False","Impossible to say"], answer:"False", explanation:"The passage says lecturers give higher grades to those who 'meet up at the pub after classes'." },
      { id:"lp3-1", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Dr Jacobsen voicemail: 'I will need to move the surgery to 2pm, so I won't require the prep team until half past twelve.' What time is the surgery?", options:["11:30","02:00am","12:30","14:00"], answer:"14:00", explanation:"Surgery rescheduled to 2pm = 14:00." },
      { id:"lp3-2", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"According to the jewellery shop passage, how old was the young girl?", options:["No older than 20","Fifteen","No older than 25","Thirteen"], answer:"No older than 20", explanation:"The passage states 'No older than 20'." },
      { id:"lp3-3", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Railway passage: Where was the first steam locomotive used?", options:["Germany","France","Britain","Spain"], answer:"Britain", explanation:"'The first steam locomotive was used in Britain.'" },
      { id:"lp3-4", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Railway passage: What was the main reason the Railway was created?", options:["Protect the environment","Fill a void","Reduce carbon emissions","Create transport for middle classes"], answer:"Fill a void", explanation:"'The railway filled a void that other forms of transport could not.'" },
      { id:"lp3-5", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Railway passage: In what year did the first steam locomotive run?", options:["1800","1901","1821","1804"], answer:"1804", explanation:"'In 1804, the first successful steam locomotive ran on wheels.'" },
      { id:"lp3-6", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Railway passage: What did the 1921 Act introduce?", options:["British Railways","Great British Railways","The Four Rails","British Rail"], answer:"British Rail", explanation:"The 1921 Act merged four companies known as 'British Rail'." },
      { id:"lp3-7", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Which word describes something not deterred by danger, pain or death?", options:["Courageous","Captivated","Berserk","Belittled"], answer:"Courageous", explanation:"Courageous = brave in the face of danger." },
      { id:"lp3-8", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Which word describes a secret plan to commit something illegal?", options:["Speculation","Deify","Decode","Conspiracy"], answer:"Conspiracy", explanation:"Conspiracy = a secret plan to commit an illegal act." },
      { id:"lp3-9", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Which word describes two things occurring at the same time or in a similar way?", options:["Parallel","Inclination","Downfall","Causation"], answer:"Parallel", explanation:"Parallel = occurring simultaneously or in a similar manner." },
      { id:"lp3-10", set:"lpractice3", setName:"Literacy Practice 3", type:"mcq", question:"Which word describes something kept or done in secret?", options:["Berate","Clandestine","Blasphemous","Precociously"], answer:"Clandestine", explanation:"Clandestine = done secretly." }
    ],

      { id:"lm1-1", set:"lmock1", setName:"Literacy Mock 1", type:"mcq", question:"Karen (NHS admin): switches on computers before checking post, then kettle, answerphone after manager brief. Correct order?", options:["Computers; Kettle; Post; Answerphone; Brief From Manager","Post; Kettle; Computers; Brief From Manager; Answerphone","Computers; Post; Kettle; Brief From Manager; Answerphone","Computers; Post; Kettle; Answerphone; Brief From Manager"], answer:"Computers; Post; Kettle; Brief From Manager; Answerphone", explanation:"Computers → Post → Kettle → Brief from Manager → Answerphone." },
      { id:"lm1-2", set:"lmock1", setName:"Literacy Mock 1", type:"mcq", question:"Robert (procurement): coffee before emails, suppliers before post, meeting before project. Correct order?", options:["Coffee; Emails; Suppliers; Post; Meeting; Project","Emails; Coffee; Suppliers; Post; Meeting; Project","Coffee; Suppliers; Emails; Post; Project; Meeting","Emails; Coffee; Post; Suppliers; Meeting; Project"], answer:"Coffee; Emails; Suppliers; Post; Meeting; Project", explanation:"Coffee → Emails → Suppliers → Post → Meeting → Project." },
      { id:"lm1-3", set:"lmock1", setName:"Literacy Mock 1", type:"mcq", question:"NHS passage: 'profesionals' is misspelt. Correct spelling?", options:["professionals","profesionnals","proffessionals","proffesionnals"], answer:"professionals", explanation:"The correct spelling is 'professionals'." },
      { id:"lm1-4", set:"lmock1", setName:"Literacy Mock 1", type:"mcq", question:"Alcohol test passage: 'leeflet' is misspelt. Which word is wrong?", options:["concussion","leeflet","associated","assessing"], answer:"leeflet", explanation:"'Leeflet' should be 'leaflet'." },
      { id:"lm1-5", set:"lmock1", setName:"Literacy Mock 1", type:"mcq", question:"Public Health England passage: which word is misspelt?", options:["Intelligence","Partnerships","Science","Wellbeen"], answer:"Wellbeen", explanation:"'Wellbeen' is not a word — should be 'wellbeing'." },
      { id:"lm2-1", set:"lmock2", setName:"Literacy Mock 2", type:"mcq", question:"Text: 'Dr Ali's train cancelled. Next train arrives at 15:35 which he will catch.' What time does Dr Ali arrive?", options:["13:45","03:15","15:35","14:15"], answer:"15:35", explanation:"He catches the train arriving at 15:35." },
      { id:"lm2-2", set:"lmock2", setName:"Literacy Mock 2", type:"mcq", question:"Steve: 521cal breakfast + 427cal lunch + 100cal dessert = 1048cal used. 452cal left for dinner. Which option fits? (Roast Beef 626, Lasagne 555, Jacket & Salad 421, Minced Beef 510, Cod & Chips 435)", options:["Roast Beef 626 cal","Lasagne 555cal","Jacket & Salad 421cal","Minced Beef & Veg 510cal"], answer:"Jacket & Salad 421cal", explanation:"Only options under 452 cal fit: Jacket & Salad (421) and Cod & Chips (435). Jacket & Salad is the safest choice." },
      { id:"lm2-3", set:"lmock2", setName:"Literacy Mock 2", type:"mcq", question:"City/rat passage: What type of narration is it written in?", options:["First person","Second person","Third person","Mixture of all three"], answer:"First person", explanation:"Uses 'I' throughout — first person narration." },
      { id:"lm2-4", set:"lmock2", setName:"Literacy Mock 2", type:"mcq", question:"City/rat passage: What literary technique is used TWICE in paragraph 1? ('beautiful backstreets bustle', 'scamper, satisfied')", options:["Metaphor","Simile","Personification","Alliteration"], answer:"Alliteration", explanation:"Alliteration: 'beautiful backstreets bustle' and 'scamper, satisfied'." },
      { id:"lm2-5", set:"lmock2", setName:"Literacy Mock 2", type:"mcq", question:"City/rat passage: 'I pleaded with myself... to no avail.' What does 'to no avail' mean?", options:["Fruitless","Consequential","Pointless","Worthwhile"], answer:"Fruitless", explanation:"'To no avail' = without success = fruitless." }
    ]
  }
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state = {
  topic: null,
  setKey: null,
  setName: null,
  mode: null,         // 'warmup' | 'practice' | 'mock'
  questions: [],
  currentIndex: 0,
  answers: [],        // {q, userAnswer, correct}
  answered: false,
  timer: null,
  timeLeft: 25 * 60
};

// ═══════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════════
function selectTopic(topic) {
  state.topic = topic;
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-topic="${topic}"]`).classList.add('selected');
  document.getElementById('homeNext').style.display = 'block';
}

function goToSetSelect() {
  if (!state.topic) return;
  buildSetList();
  document.getElementById('ssTitle').textContent = state.topic === 'numeracy' ? 'Numeracy Tests' : 'Literacy Tests';
  document.getElementById('ssTopicTag').textContent = state.topic.toUpperCase();
  showScreen('setselect');
}

// ═══════════════════════════════════════════════
//  SET SELECT
// ═══════════════════════════════════════════════
function buildSetList() {
  const container = document.getElementById('setListContainer');
  const topicData = DATA[state.topic];
  container.innerHTML = '';

  // Group by category (warmup / practice / mock)
  const groups = {
    warmup: { label: '🔥 Warm-Up', sets: {} },
    practice: { label: '📝 Practice Tests', sets: {} },
    mock: { label: '⏱ Mock Tests', sets: {} }
  };

  Object.keys(groups).forEach(cat => {
    const qs = topicData[cat] || [];
    qs.forEach(q => {
      if (!groups[cat].sets[q.set]) {
        groups[cat].sets[q.set] = { name: q.setName, count: 0, key: q.set, cat };
      }
      groups[cat].sets[q.set].count++;
    });
  });

  Object.entries(groups).forEach(([cat, grp]) => {
    const sets = Object.values(grp.sets);
    if (!sets.length) return;

    const groupEl = document.createElement('div');
    groupEl.className = 'set-group';
    groupEl.innerHTML = `<div class="set-group-title">${grp.label}</div><div class="set-list" id="sl-${cat}"></div>`;
    container.appendChild(groupEl);

    const list = groupEl.querySelector(`#sl-${cat}`);
    sets.forEach(s => {
      const item = document.createElement('div');
      item.className = 'set-item';
      item.innerHTML = `
        <div class="set-item-left">
          <div class="set-item-name">${s.name}</div>
          <div class="set-item-meta">${s.count} question${s.count !== 1 ? 's' : ''}</div>
        </div>
        <div class="set-item-arrow">→</div>
      `;
      item.onclick = () => selectSet(s.key, s.name, cat, s.count);
      list.appendChild(item);
    });
  });
}

function selectSet(setKey, setName, cat, count) {
  state.setKey = setKey;
  state.setName = setName;

  // Build mode screen
  document.getElementById('mhTopic').textContent = state.topic.toUpperCase();
  document.getElementById('mhSet').textContent = setName;
  document.getElementById('mhCount').textContent = `${count} questions`;

  buildModeCards(cat);
  showScreen('modeselect');
}

// ═══════════════════════════════════════════════
//  MODE SELECT
// ═══════════════════════════════════════════════
function buildModeCards(defaultCat) {
  const container = document.getElementById('modeCards');
  container.innerHTML = '';

  const modes = [
    {
      mode: 'warmup',
      cls: 'mode-warmup',
      icon: '🔥',
      name: 'Warm-Up Mode',
      desc: 'Type-in answers with instant feedback after each question',
      badge: 'Input • Instant',
      available: defaultCat === 'warmup'
    },
    {
      mode: 'practice',
      cls: 'mode-practice',
      icon: '📝',
      name: 'Practice Mode',
      desc: 'Multiple choice with immediate answer validation',
      badge: 'MCQ • Instant',
      available: true
    },
    {
      mode: 'mock',
      cls: 'mode-mock',
      icon: '⏱',
      name: 'Mock Exam Mode',
      desc: 'Timed 25-minute exam — results shown only at the end',
      badge: '25 MIN TIMED',
      available: true
    }
  ];

  modes.forEach(m => {
    if (!m.available && defaultCat !== 'warmup') return;

    const card = document.createElement('div');
    card.className = `mode-card ${m.cls}`;
    card.innerHTML = `
      <div class="mode-card-icon">${m.icon}</div>
      <div class="mode-card-text">
        <div class="mode-card-name">${m.name}</div>
        <div class="mode-card-desc">${m.desc}</div>
      </div>
      <div class="mode-card-badge">${m.badge}</div>
    `;
    card.onclick = () => startQuiz(m.mode);
    container.appendChild(card);
  });
}

// ═══════════════════════════════════════════════
//  QUIZ ENGINE
// ═══════════════════════════════════════════════
function startQuiz(mode) {
  state.mode = mode;
  state.currentIndex = 0;
  state.answers = [];
  state.answered = false;
  clearTimer();

  // Get questions for this set from the right category
  const cat = mode === 'warmup' ? 'warmup'
            : mode === 'practice' ? 'practice'
            : 'mock';

  let qs = (DATA[state.topic][cat] || []).filter(q => q.set === state.setKey);

  // If no questions in that exact category for this set, use all topic questions for that mode
  if (!qs.length) {
    // Fallback: if mock mode selected on a non-mock set, grab all mock questions
    qs = DATA[state.topic][cat] || [];
  }

  // Shuffle for mock
  if (mode === 'mock') {
    qs = [...qs].sort(() => Math.random() - 0.5);
  }

  state.questions = qs;

  // Header
  document.getElementById('qSetName').textContent = state.setName;
  document.getElementById('qModeTag').textContent =
    mode === 'warmup' ? '🔥 Warm-Up' :
    mode === 'practice' ? '📝 Practice' : '⏱ Mock Exam';

  // Timer for mock
  if (mode === 'mock') {
    state.timeLeft = 25 * 60;
    document.getElementById('qTimer').classList.remove('hidden');
    updateTimerDisplay();
    state.timer = setInterval(tickTimer, 1000);
  } else {
    document.getElementById('qTimer').classList.add('hidden');
  }

  showScreen('quiz');
  renderQuestion();
}

function tickTimer() {
  state.timeLeft--;
  updateTimerDisplay();
  if (state.timeLeft <= 0) {
    clearTimer();
    endQuiz();
  }
  if (state.timeLeft <= 60) {
    document.getElementById('qTimer').classList.add('urgent');
  }
}

function updateTimerDisplay() {
  const m = Math.floor(state.timeLeft / 60).toString().padStart(2, '0');
  const s = (state.timeLeft % 60).toString().padStart(2, '0');
  document.getElementById('qTimer').textContent = `${m}:${s}`;
}

function clearTimer() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}

function renderQuestion() {
  const q = state.questions[state.currentIndex];
  if (!q) { endQuiz(); return; }

  state.answered = false;

  // Progress
  const pct = ((state.currentIndex) / state.questions.length * 100).toFixed(0);
  document.getElementById('qProgressFill').style.width = pct + '%';
  document.getElementById('qProgressLabel').textContent = `${state.currentIndex + 1} / ${state.questions.length}`;
  document.getElementById('qCounter').textContent = `Question ${state.currentIndex + 1} of ${state.questions.length}`;

  // Question text
  document.getElementById('qText').textContent = q.question;

  // Reset feedback
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.style.display = 'none';

  // Show correct input type
  const optGrid = document.getElementById('optionsGrid');
  const inputWrap = document.getElementById('inputWrap');

  if (q.type === 'input') {
    optGrid.classList.add('hidden');
    inputWrap.classList.remove('hidden');
    const field = document.getElementById('inputField');
    field.value = '';
    field.className = 'input-field';
    field.disabled = false;
    field.focus();
    field.onkeydown = (e) => { if (e.key === 'Enter' && !state.answered) submitInput(); };
  } else {
    inputWrap.classList.add('hidden');
    optGrid.classList.remove('hidden');
    renderOptions(q);
  }

  renderActions();
}

function renderOptions(q) {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D','E'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.value = opt;
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(btn, opt, q);
    grid.appendChild(btn);
  });
}

function selectOption(btn, val, q) {
  if (state.answered) return;

  if (state.mode === 'mock') {
    // In mock: just highlight selection, no feedback
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    // Store tentative answer (will be confirmed on Next)
    state._pendingAnswer = val;
    renderActions();
  } else {
    // Practice: immediate feedback
    state.answered = true;
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    const correct = val === q.answer;
    btn.classList.add(correct ? 'correct' : 'wrong');

    if (!correct) {
      // Highlight correct answer
      document.querySelectorAll('.option-btn').forEach(b => {
        if (b.dataset.value === q.answer) b.classList.add('correct');
      });
    }

    showFeedback(correct, q.explanation, q.answer);
    recordAnswer(q, val, correct);
    renderActions();
  }
}

function submitInput() {
  const q = state.questions[state.currentIndex];
  const field = document.getElementById('inputField');
  const raw = field.value.trim();
  if (!raw) return;

  state.answered = true;
  field.disabled = true;

  const normalise = v => v.replace(/[£,\s]/g, '').toLowerCase();
  const correct = q.acceptedAnswers.some(a => normalise(a) === normalise(raw));

  field.className = 'input-field ' + (correct ? 'correct' : 'wrong');
  showFeedback(correct, `Correct answer: ${q.answer}`, q.answer);
  recordAnswer(q, raw, correct);
  renderActions();
}

function showFeedback(correct, explanation, correctAnswer) {
  if (state.mode === 'mock') return; // No feedback in mock

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong') + ' show';
  fb.style.display = 'block';

  document.getElementById('feedbackStatus').innerHTML =
    correct ? '✓ Correct!' : `✗ Incorrect — correct answer: <strong>${correctAnswer}</strong>`;
  document.getElementById('feedbackExp').textContent = explanation || '';
}

function recordAnswer(q, userAnswer, correct) {
  state.answers.push({ q, userAnswer, correct });
}

function renderActions() {
  const actions = document.getElementById('quizActions');
  actions.innerHTML = '';
  const q = state.questions[state.currentIndex];
  const isLast = state.currentIndex === state.questions.length - 1;

  if (state.mode === 'mock') {
    // In mock, show Next/Submit without answering required
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary btn-full';
    btn.textContent = isLast ? 'Submit Exam' : 'Next Question →';
    btn.onclick = () => {
      // Record mock answer
      if (state._pendingAnswer !== undefined) {
        const correct = state._pendingAnswer === q.answer;
        recordAnswer(q, state._pendingAnswer, correct);
        state._pendingAnswer = undefined;
      } else {
        // Skipped
        recordAnswer(q, '', false);
      }
      // Clear selections
      document.querySelectorAll('.option-btn').forEach(b => {
        b.classList.remove('selected');
        b.disabled = false;
      });
      if (isLast) endQuiz();
      else { state.currentIndex++; renderQuestion(); }
    };
    actions.appendChild(btn);
  } else {
    // Warmup / Practice
    if (!state.answered) {
      if (q.type === 'input') {
        const btn = document.createElement('button');
        btn.className = 'btn btn-primary';
        btn.textContent = 'Check Answer';
        btn.onclick = submitInput;
        actions.appendChild(btn);
      }
      // MCQ: options handle submission
    } else {
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary btn-full';
      btn.textContent = isLast ? 'See Results →' : 'Next Question →';
      btn.onclick = () => {
        if (isLast) endQuiz();
        else { state.currentIndex++; renderQuestion(); }
      };
      actions.appendChild(btn);
    }
  }
}

function confirmQuit() {
  if (confirm('Quit this session? Progress will be lost.')) {
    clearTimer();
    showScreen('setselect');
  }
}

// ═══════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════
function endQuiz() {
  clearTimer();

  const total = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = total ? Math.round((correct / total) * 100) : 0;

  document.getElementById('rLabel').textContent = `${state.setName} · ${state.mode.toUpperCase()} MODE`;
  document.getElementById('rScore').textContent = pct + '%';
  document.getElementById('rFraction').textContent = `${correct} out of ${total} correct`;

  const fill = document.getElementById('rFill');
  fill.style.width = '0%';
  setTimeout(() => fill.style.width = pct + '%', 100);
  fill.className = 'results-percent-fill ' + (pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'low');

  const msgs = pct >= 80
    ? ['Excellent work! You\'re well prepared.', 'Outstanding performance!', 'Great score — keep it up!']
    : pct >= 60
    ? ['Good effort — review any mistakes.', 'Solid attempt, some areas to improve.']
    : ['Keep practising — you\'ll get there.', 'Review the explanations and try again.'];
  document.getElementById('rMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  // Breakdown
  const breakdown = document.getElementById('rBreakdown');
  const list = document.getElementById('rBreakdownList');
  list.innerHTML = '';

  if (state.answers.length > 0) {
    breakdown.style.display = 'block';
    state.answers.forEach((a, i) => {
      const item = document.createElement('div');
      item.className = 'breakdown-item';
      const preview = a.q.question.length > 80
        ? a.q.question.slice(0, 80) + '…'
        : a.q.question;

      item.innerHTML = `
        <div class="breakdown-icon ${a.correct ? 'c' : 'w'}">${a.correct ? '✓' : '✗'}</div>
        <div class="breakdown-q">
          <strong>Q${i+1}: ${preview}</strong>
          ${!a.correct ? `<div class="breakdown-correct-ans">✓ ${a.q.answer}</div>` : ''}
          ${a.q.explanation ? `<span>${a.q.explanation}</span>` : ''}
        </div>
      `;
      list.appendChild(item);
    });
  } else {
    breakdown.style.display = 'none';
  }

  showScreen('results');
}

function retryQuiz() {
  startQuiz(state.mode);
}
</script>
